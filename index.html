<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Case Opener</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="app">

        <!-- Шапка с балансом -->
        <div class="header">
            <div class="user-info">
                <div class="avatar">🎮</div>
                <div class="user-name" id="userName">Player</div>
            </div>
            <div class="balance-block">
                <span class="balance-icon">🪙</span>
                <span class="balance-amount" id="balanceAmount">0</span>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <div class="tab active" data-tab="earn">📋 Tasks</div>
            <div class="tab disabled" data-tab="cases">🎁 Cases</div>
            <div class="tab disabled" data-tab="shop">🛒 Shop</div>
        </div>

        <!-- Контент вкладки Tasks -->
        <div class="tab-content" id="earnTab">

            <div class="section-title">Complete tasks to earn coins</div>

            <!-- Задание 1: Подписка на канал -->
            <div class="task-card" id="task-subscribe">
                <div class="task-icon">📢</div>
                <div class="task-info">
                    <div class="task-name">Subscribe to channel</div>
                    <div class="task-reward">+500 🪙</div>
                </div>
                <button class="task-btn" onclick="doSubscribe()">Go</button>
            </div>

            <!-- Задание 2: Ежедневный бонус -->
            <div class="task-card" id="task-daily">
                <div class="task-icon">📅</div>
                <div class="task-info">
                    <div class="task-name">Daily bonus</div>
                    <div class="task-reward">+100 🪙</div>
                </div>
                <button class="task-btn" onclick="doDaily()">Claim</button>
            </div>

            <!-- Задание 3: Реакция -->
            <div class="task-card" id="task-reaction">
                <div class="task-icon">👍</div>
                <div class="task-info">
                    <div class="task-name">Leave a reaction</div>
                    <div class="task-reward">+50 🪙</div>
                </div>
                <button class="task-btn" onclick="doReaction()">React</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
