<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter CS2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="app">
        <header class="header">
            <h1 class="logo">HUNTER CS2</h1>
            <p class="subtitle">Открывай лучшие кейсы с нами!</p>
        </header>

        <main class="main-content" id="earnTab">
            
            <div class="balance-container">
                <div class="balance-display">
                    <span class="currency-icon">💎</span>
                    <span class="balance-amount" id="balanceAmount">0</span>
                </div>
                <div class="balance-label">ваш баланс</div>
                <button class="buy-btn">Купить алмазы</button>
            </div>

            <div class="tasks-section">
                <h2 class="section-title">Активные задания</h2>

                <div class="task-card" id="task-daily">
                    <div class="task-info">
                        <div class="task-name">Ежедневные награды</div>
                        <div class="task-progress">💎 💎 💎 🤍 🤍</div>
                    </div>
                    <div class="task-action">
                        <div class="timer">23:37:48</div>
                    </div>
                </div>

                <div class="task-card" id="task-subscribe">
                    <div class="task-info">
                        <div class="task-name">Подписаться на канал</div>
                        <div class="task-reward"><span class="plus">+500</span> 💎 за подписку</div>
                    </div>
                    <div class="task-action">
                        <button class="task-btn" onclick="doSubscribe()">Проверить</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-tab="earn">
                <div class="nav-icon">💎</div>
                <div class="nav-text" id="navBalance">0</div>
            </div>
            <div class="nav-item" data-tab="cases">
                <div class="nav-icon">🕹️</div>
                <div class="nav-text">Игры</div>
            </div>
            <div class="nav-item" data-tab="inventory">
                <div class="nav-icon">🎒</div>
                <div class="nav-text">Инвентарь</div>
            </div>
            <div class="nav-item" data-tab="profile">
                <div class="nav-icon">👤</div>
                <div class="nav-text">Профиль</div>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
